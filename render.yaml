# render.yaml — Render Blueprint for LuxeCart
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy backend with one click from your GitHub repo.
# After deploying frontend to Vercel, update CLIENT_URL in Render Dashboard.

services:
  # ── Backend: Express REST API ──────────────────────────────────────────────
  - type: web
    name: luxecart-api
    runtime: node
    region: singapore   # Choose: oregon, frankfurt, singapore, ohio
    plan: free          # Free tier: 750 hrs/month, spins down after inactivity
    rootDir: apps/backend
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && npx prisma generate && npx tsc
    startCommand: node dist/app.js
    healthCheckPath: /health

    # Environment Variables — set secrets manually in Render Dashboard (Settings > Environment)
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      # ── Set this to your Vercel frontend URL after deploying the frontend ──
      # Example: https://luxecart.vercel.app
      - key: CLIENT_URL
        value: https://your-vercel-app.vercel.app

      # ── All secrets below must be set manually in Render Dashboard ──────────
      # DATABASE_URL          → Your Neon PostgreSQL connection string
      #                         Format: postgresql://user:pass@host/db?sslmode=require
      #
      # JWT_ACCESS_SECRET     → Random 64-char hex string
      #                         Generate: openssl rand -hex 64
      # JWT_REFRESH_SECRET    → Random 64-char hex string (different from above)
      #                         Generate: openssl rand -hex 64
      # JWT_ACCESS_EXPIRES_IN → 15m
      # JWT_REFRESH_EXPIRES_IN→ 7d
      #
      # SESSION_SECRET        → Random 32-char hex string
      #                         Generate: openssl rand -hex 32
      #
      # GOOGLE_CLIENT_ID      → From Google Cloud Console (OAuth 2.0 Credentials)
      # GOOGLE_CLIENT_SECRET  → From Google Cloud Console
      # GOOGLE_CALLBACK_URL   → https://your-render-url.onrender.com/api/v1/auth/google/callback
      #
      # SMTP_HOST             → smtp.gmail.com
      # SMTP_PORT             → 587
      # SMTP_USER             → Your Gmail address
      # SMTP_PASS             → Your Gmail App Password (16 chars, no spaces)
      # EMAIL_FROM            → LuxeCart <noreply@luxecart.com>
      #
      # CLOUDINARY_CLOUD_NAME → From Cloudinary dashboard
      # CLOUDINARY_API_KEY    → From Cloudinary dashboard
      # CLOUDINARY_API_SECRET → From Cloudinary dashboard
      #
      # STRIPE_SECRET_KEY     → From Stripe dashboard (sk_live_... for production)
      # STRIPE_WEBHOOK_SECRET → From Stripe webhook settings (whsec_...)
      #
      # RAZORPAY_KEY_ID       → From Razorpay dashboard (rzp_live_...)
      # RAZORPAY_KEY_SECRET   → From Razorpay dashboard
