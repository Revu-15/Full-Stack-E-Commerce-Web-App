version: '3.8'

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: luxecart-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: luxecart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Express REST API Backend ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: luxecart-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/luxecart?sslmode=disable
      JWT_ACCESS_SECRET: luxecart-production-jwt-access-secret-32-chars
      JWT_REFRESH_SECRET: luxecart-production-jwt-refresh-secret-32-chars
      CLIENT_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js 15 Storefront Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: luxecart-storefront
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
